<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>行動盤點助手 - 代碼同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 pb-32 text-slate-900">

    <!-- 導航欄 -->
    <nav class="bg-white border-b sticky top-0 z-40 px-4 py-3 flex items-center justify-between shadow-sm">
        <div class="flex items-center gap-2">
            <div class="bg-indigo-600 p-1.5 rounded-lg text-white">
                <i class="fas fa-boxes"></i>
            </div>
            <h1 class="font-bold text-slate-800 tracking-tight">行動盤點助手</h1>
        </div>
        <button onclick="showImportModal()" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-xl text-xs font-black flex items-center gap-1.5 active:scale-95 transition-transform">
            <i class="fas fa-keyboard"></i> 電腦端輸入同步
        </button>
    </nav>

    <main class="max-w-2xl mx-auto p-4">
        <!-- 頂部操作按鈕 -->
        <div class="flex gap-2 mb-6 overflow-x-auto pb-2 no-scrollbar">
            <button id="exportBtn" onclick="exportToExcel()" class="flex items-center gap-2 bg-white border border-slate-200 px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap active:bg-slate-50 transition-colors">
                <i class="fas fa-file-excel text-emerald-500"></i> 匯出 Excel
            </button>
            <button onclick="generateSyncQR()" class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap active:bg-indigo-700 transition-colors">
                <i class="fas fa-paper-plane"></i> 手機傳送數據
            </button>
            <div class="h-8 w-px bg-slate-200 mx-1"></div>
            <button onclick="confirmReset()" class="flex items-center gap-2 bg-white border border-red-50 px-4 py-2.5 rounded-xl text-xs font-bold shadow-sm whitespace-nowrap text-red-500 active:bg-red-50">
                <i class="fas fa-trash-alt"></i> 清除
            </button>
        </div>

        <!-- 搜尋 -->
        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
            <input type="text" id="searchInput" placeholder="快速搜尋品名、編碼..." class="w-full pl-11 pr-4 py-3.5 bg-white border border-slate-200 rounded-2xl shadow-sm outline-none focus:ring-2 focus:ring-indigo-500/20 text-sm" oninput="renderList()" />
        </div>

        <!-- 分類 -->
        <div id="categoryTabs" class="flex gap-2 overflow-x-auto no-scrollbar mb-6"></div>

        <!-- 清單 -->
        <div id="inventoryList" class="grid gap-3"></div>
    </main>

    <!-- 底部固定統計列 -->
    <div class="fixed bottom-0 inset-x-0 bg-white/95 backdrop-blur-md border-t p-4 pb-8 flex items-center justify-between z-40 shadow-2xl">
        <div class="flex flex-col">
            <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">當前盤點進度</span>
            <div class="flex items-baseline gap-1">
                <span id="totalStats" class="text-2xl font-black text-indigo-600">0 / 0</span>
                <span class="text-[10px] text-slate-400 font-bold">項目已填寫</span>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[9px] text-slate-400 font-medium">數據儲存於此裝置</p>
        </div>
    </div>

    <!-- 彈窗：手機顯示 QR 與 代碼 -->
    <div id="qrModal" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl flex flex-col items-center">
            <h2 class="text-xl font-black mb-2 text-slate-800">數據同步</h2>
            <p class="text-xs text-slate-500 mb-6 text-center">電腦無鏡頭？請複製下方代碼並傳給電腦</p>
            
            <div id="qrcode" class="p-4 bg-white border border-slate-100 rounded-2xl mb-6"></div>
            
            <div class="w-full bg-slate-50 p-4 rounded-2xl mb-6 relative">
                <label class="text-[10px] font-bold text-slate-400 uppercase">同步字串 (數據代碼)</label>
                <textarea id="syncString" readonly class="w-full bg-transparent text-[10px] text-slate-600 break-all resize-none mt-1 h-12 outline-none"></textarea>
                <button onclick="copySyncString()" class="mt-2 w-full py-2 bg-indigo-50 text-indigo-600 rounded-xl text-xs font-bold hover:bg-indigo-100 transition-colors">
                    <i class="fas fa-copy mr-1"></i> 點我複製代碼
                </button>
            </div>

            <button onclick="closeModal('qrModal')" class="w-full py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">關閉視窗</button>
        </div>
    </div>

    <!-- 彈窗：電腦端輸入代碼 -->
    <div id="importModal" class="hidden fixed inset-0 bg-slate-900/90 z-50 flex items-center justify-center p-4 backdrop-blur-md">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <h2 class="text-xl font-black mb-2 text-slate-800">輸入同步代碼</h2>
            <p class="text-xs text-slate-500 mb-6">請貼上手機傳來的同步字串</p>
            
            <textarea id="inputSyncString" placeholder="在此貼上代碼..." class="w-full h-32 p-4 bg-slate-50 border border-slate-200 rounded-2xl text-[10px] text-slate-600 outline-none focus:ring-2 focus:ring-indigo-500/20 mb-4"></textarea>
            
            <div class="flex gap-2">
                <button onclick="closeModal('importModal')" class="flex-1 py-4 bg-slate-100 text-slate-500 rounded-2xl font-bold">取消</button>
                <button onclick="processSyncString()" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">確認同步</button>
            </div>
        </div>
    </div>

    <script>
        const INITIAL_DATA = [
            { id: '1', sku: "93050399", category: "貼紙", name: "標籤貼紙80*63mm/1500張(A款)-理用", quantity: 0 },
            { id: '2', sku: "93050399", category: "貼紙", name: "標籤貼紙35*25mm/3500張理用", quantity: 0 },
            { id: '3', sku: "93050399", category: "碳帶", name: "10M碳帶", quantity: 0 },
            { id: '4', sku: "93320201", category: "手套", name: "PVC手套XL", quantity: 0 },
            { id: '5', sku: "93129999", category: "膠帶", name: "透明膠帶(寬)", quantity: 0 }
        ];

        let inventoryItems = JSON.parse(localStorage.getItem('my_inventory_v3')) || INITIAL_DATA;
        let currentCategory = '全部';

        function saveData() {
            localStorage.setItem('my_inventory_v3', JSON.stringify(inventoryItems));
            updateStats();
        }

        function updateStats() {
            const filled = inventoryItems.filter(i => i.quantity > 0).length;
            document.getElementById('totalStats').innerText = `${filled} / ${inventoryItems.length}`;
        }

        window.renderList = () => {
            const listEl = document.getElementById('inventoryList');
            const tabsEl = document.getElementById('categoryTabs');
            const search = document.getElementById('searchInput').value.toLowerCase();

            const cats = ['全部', ...new Set(inventoryItems.map(i => i.category))];
            tabsEl.innerHTML = cats.map(cat => `
                <button onclick="setCat('${cat}')" class="px-5 py-2.5 rounded-2xl text-xs font-bold whitespace-nowrap transition-all ${currentCategory === cat ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-500 border border-slate-100'}">
                    ${cat}
                </button>
            `).join('');

            let filtered = inventoryItems.filter(i => (i.name + i.sku).toLowerCase().includes(search));
            if (currentCategory !== '全部') filtered = filtered.filter(i => i.category === currentCategory);

            listEl.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-[1.5rem] p-5 border flex items-center justify-between shadow-sm ${item.quantity > 0 ? 'border-indigo-400 bg-indigo-50/20' : 'border-slate-100'}">
                    <div class="flex-1 min-w-0 pr-4">
                        <div class="text-[10px] font-bold text-slate-400 mb-1 tracking-wider">${item.sku}</div>
                        <div class="font-bold text-slate-800 text-sm leading-snug">${item.name}</div>
                    </div>
                    <div class="flex items-center bg-white rounded-2xl border border-slate-200 shadow-sm p-1">
                        <button onclick="changeQty('${item.id}', -1)" class="w-10 h-10 flex items-center justify-center text-slate-400 font-bold">-</button>
                        <input type="number" value="${item.quantity}" class="w-10 text-center font-black text-slate-800 bg-transparent outline-none p-0" onchange="setQty('${item.id}', this.value)" />
                        <button onclick="changeQty('${item.id}', 1)" class="w-10 h-10 flex items-center justify-center text-slate-400 font-bold">+</button>
                    </div>
                </div>
            `).join('');
        };

        window.changeQty = (id, delta) => {
            const item = inventoryItems.find(i => i.id === id);
            if (item) { item.quantity = Math.max(0, item.quantity + delta); saveData(); renderList(); }
        };

        window.setQty = (id, val) => {
            const item = inventoryItems.find(i => i.id === id);
            if (item) { item.quantity = Math.max(0, parseInt(val) || 0); saveData(); renderList(); }
        };

        window.setCat = (c) => { currentCategory = c; renderList(); };

        // 同步邏輯：手機端
        window.generateSyncQR = () => {
            const activeData = inventoryItems.filter(i => i.quantity > 0).map(i => [i.id, i.quantity]);
            if (activeData.length === 0) return alert('無數據。');
            
            const payload = JSON.stringify(activeData);
            document.getElementById('syncString').value = payload;
            
            const qrContainer = document.getElementById('qrcode');
            qrContainer.innerHTML = '';
            new QRCode(qrContainer, { text: payload, width: 200, height: 200, colorDark : "#4f46e5" });
            
            document.getElementById('qrModal').classList.remove('hidden');
        };

        window.copySyncString = () => {
            const text = document.getElementById('syncString');
            text.select();
            document.execCommand('copy');
            alert('代碼已複製！請透過通訊軟體傳給電腦。');
        };

        // 同步邏輯：電腦端
        window.showImportModal = () => document.getElementById('importModal').classList.remove('hidden');
        
        window.processSyncString = () => {
            const val = document.getElementById('inputSyncString').value;
            try {
                const incoming = JSON.parse(val);
                incoming.forEach(([id, qty]) => {
                    const target = inventoryItems.find(i => i.id === id);
                    if (target) target.quantity = qty;
                });
                saveData();
                renderList();
                closeModal('importModal');
                alert('同步成功！數據已載入。');
            } catch (e) {
                alert('無效的代碼格式。');
            }
        };

        window.exportToExcel = () => {
            const exportData = inventoryItems.filter(i => i.quantity > 0).map(i => ({ '編碼': i.sku, '品名': i.name, '數量': i.quantity }));
            if (exportData.length === 0) return alert('無數據。');
            const ws = XLSX.utils.json_to_sheet(exportData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "盤點結果");
            XLSX.writeFile(wb, `盤點表_${new Date().getTime()}.xlsx`);
        };

        window.confirmReset = () => { if (confirm('確定清空？')) { inventoryItems.forEach(i => i.quantity = 0); saveData(); renderList(); } };
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        renderList();
        updateStats();
    </script>
</body>
</html>
